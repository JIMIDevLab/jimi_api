# Server
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force-response: true
      enabled: true

# Database
spring:
  datasource:
    url: ${DB_URL:jdbc:mariadb://51.222.136.185:3306/JIMI?useSSL=false&serverTimezone=Europe/Paris}
    username: ${DB_USERNAME:julsql}
    password: ${DB_PASSWORD:}
    driver-class-name: org.mariadb.jdbc.Driver
    defer-datasource-initialization: true
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

# Swagger
springdoc:
  default-produces-media-type: application/json

# Mistral AI chat completions. Set MISTRAL_API_KEY in .env (gitignored).
llm:
  url: https://api.mistral.ai/v1/chat/completions
  model: ${MISTRAL_MODEL:mistral-small-latest}
  api-key: ${MISTRAL_API_KEY:}
  temperature: 0.2
  json-mode: true

logging:
  level:
    org:
      springframework:
        jdbc:
          core: DEBUG
        web: info
    root: info
  file:
    path: ./logs

name: deploy

# Push-to-deploy. SSHes into the server and runs the same docker compose
# rebuild as a manual deploy.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#
#   SSH_HOST     hostname of the server
#   SSH_USER     ssh user (e.g. deploy)
#   SSH_KEY      private SSH key authorized on the server
#   DEPLOY_PATH  absolute path on the host (e.g. /opt/jimi_api)
#
# The server must have a git checkout of this repo at DEPLOY_PATH
# already, plus a working `.env` with MISTRAL_API_KEY (never overwritten
# by the deploy).

on:
  push:
    branches: [main]
  workflow_dispatch:

# This workflow only SSHes into the server; it never uses the GITHUB_TOKEN,
# so grant it no permissions at all (principle of least privilege).
permissions: {}

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_PATH }}
            git pull
            docker compose down
            docker compose build --no-cache
            docker compose up -d
            docker image prune -f
